# ============================================================
# Alembic - Atajo en la raíz de backend/
# ============================================================
# La configuración real vive en database/migrations/alembic.ini
# Este archivo solo apunta script_location para que comandos como
#   alembic upgrade head
#   alembic revision --autogenerate -m "..."
# funcionen sin pasar --config explícitamente.
# ============================================================

[alembic]
script_location = database/migrations
prepend_sys_path = .
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
output_encoding = utf-8
timezone = UTC
truncate_slug_length = 50
revision_environment = false
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
