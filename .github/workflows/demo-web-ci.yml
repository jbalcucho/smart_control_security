name: Demo Web CI

on:
  push:
    branches: [main, develop]
    paths:
      - "demo-web/**"
      - ".github/workflows/demo-web-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "demo-web/**"
      - ".github/workflows/demo-web-ci.yml"

defaults:
  run:
    working-directory: demo-web

jobs:
  lint-and-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: demo-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: demo-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Variables dummy para que Next.js pueda build sin conectar a servicios reales
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/dummy"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXTAUTH_SECRET: "ci-dummy-secret-not-for-production-use-only"
          AWS_REGION: "us-east-1"
          AWS_ACCESS_KEY_ID: "dummy"
          AWS_SECRET_ACCESS_KEY: "dummy"
          S3_BUCKET_NAME: "dummy-bucket"
        run: npm run build
